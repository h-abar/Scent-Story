# إعدادات نشر Railway عبر Nixpacks

# 1) تثبيت الحزم
[phases.setup]
# يُستخدم Volume لـ /data/uploads تلقائيًا عند ربطه بالخدمة

# 2) البناء
[phases.build]
cmds = [
  "npm run prisma:generate",
  "npm run build",
]

# 3) مرحلة الإطلاق
[start]
# تطبيق migrations ثم تشغيل seed ثم إقلاع الخادم
cmd = "npx prisma migrate deploy && npm run seed && npm run start"
